AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Minimal always-on MPP and Tempo payments intelligence agent

Parameters:
  CollectScheduleState:
    Type: String
    Default: DISABLED
    AllowedValues: [ENABLED, DISABLED]
  ReportScheduleState:
    Type: String
    Default: DISABLED
    AllowedValues: [ENABLED, DISABLED]
  ScheduleTimezone:
    Type: String
    Default: America/Los_Angeles
  CollectScheduleExpression:
    Type: String
    Default: cron(0 7 * * ? *)
  ReportScheduleExpression:
    Type: String
    Default: cron(30 11 ? * SUN *)
  CollectionWindowDays:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 31
  ReportWindowDays:
    Type: Number
    Default: 7
    MinValue: 1
    MaxValue: 31
  GoogleSheetsEnabled:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
  GoogleSheetId:
    Type: String
    Default: ""
  GoogleCredentialsParameterName:
    Type: String
    Default: mpp-pulse/google-service-account
  BedrockModelId:
    Type: String
    Default: us.amazon.nova-2-lite-v1:0
  GitHubRepository:
    Type: String
    Default: tempoxyz/mpp
  EmailTo:
    Type: String
    Default: mpp-pulse@sandboxlabs.ai
  EmailFrom:
    Type: String
    Default: mpp-pulse@sandboxlabs.ai

Resources:
  PulseTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
      SSESpecification:
        SSEEnabled: true
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

  ReportBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireReports
            Status: Enabled
            ExpirationInDays: 30

  PulseFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: app.lambda_handler
      Runtime: python3.11
      Architectures: [arm64]
      MemorySize: 512
      Timeout: 90
      ReservedConcurrentExecutions: 1
      Environment:
        Variables:
          TABLE_NAME: !Ref PulseTable
          BUCKET_NAME: !Ref ReportBucket
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          GITHUB_REPOSITORY: !Ref GitHubRepository
          EMAIL_TO: !Ref EmailTo
          EMAIL_FROM: !Ref EmailFrom
          COLLECTION_WINDOW_DAYS: !Ref CollectionWindowDays
          REPORT_WINDOW_DAYS: !Ref ReportWindowDays
          GOOGLE_SHEETS_ENABLED: !Ref GoogleSheetsEnabled
          GOOGLE_SHEET_ID: !Ref GoogleSheetId
          GOOGLE_CREDENTIALS_PARAMETER: !Ref GoogleCredentialsParameterName
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PulseTable
        - S3CrudPolicy:
            BucketName: !Ref ReportBucket
        - Statement:
            - Effect: Allow
              Action: bedrock:InvokeModel
              Resource: "*"
            - Effect: Allow
              Action: ses:SendEmail
              Resource: "*"
            - Effect: Allow
              Action: ssm:GetParameter
              Resource: !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${GoogleCredentialsParameterName}"
      Events:
        CollectSchedule:
          Type: ScheduleV2
          Properties:
            Name: !Sub "${AWS::StackName}-collect"
            Description: Collect machine-payments evidence without generating a report
            ScheduleExpression: !Ref CollectScheduleExpression
            ScheduleExpressionTimezone: !Ref ScheduleTimezone
            State: !Ref CollectScheduleState
            FlexibleTimeWindow:
              Mode: "OFF"
            RetryPolicy:
              MaximumEventAgeInSeconds: 3600
              MaximumRetryAttempts: 1
            Input: !Sub
              - '{"trigger":"collect_schedule","mode":"collect","window_days":${WindowDays}}'
              - WindowDays: !Ref CollectionWindowDays
        ReportSchedule:
          Type: ScheduleV2
          Properties:
            Name: !Sub "${AWS::StackName}-report"
            Description: Generate a machine-payments report from persisted evidence
            ScheduleExpression: !Ref ReportScheduleExpression
            ScheduleExpressionTimezone: !Ref ScheduleTimezone
            State: !Ref ReportScheduleState
            FlexibleTimeWindow:
              Mode: "OFF"
            RetryPolicy:
              MaximumEventAgeInSeconds: 3600
              MaximumRetryAttempts: 1
            Input: !Sub
              - '{"trigger":"report_schedule","mode":"report","window_days":${WindowDays}}'
              - WindowDays: !Ref ReportWindowDays

  FunctionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: MPP Pulse Lambda invocation errors
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref PulseFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

Outputs:
  FunctionName:
    Value: !Ref PulseFunction
  TableName:
    Value: !Ref PulseTable
  BucketName:
    Value: !Ref ReportBucket
  CollectScheduleName:
    Value: !Sub "${AWS::StackName}-collect"
  ReportScheduleName:
    Value: !Sub "${AWS::StackName}-report"
